name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - 'barber-panel/src/**'
      - 'barber-panel/public/**'
      - 'barber-panel/package.json'
      - 'functions/**'
      - 'firebase.json'
      - '.firebaserc'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: barber-panel/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: barber-panel

      - name: Build
        run: npm run build
        working-directory: barber-panel

      - name: Deploy to Firebase Hosting
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_HAVUZ_44F70 }}' > /tmp/sa.json
          npx firebase-tools@latest deploy --only hosting --project havuz-44f70
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
