name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: barber-panel/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: barber-panel

      - name: Build
        run: CI=false npm run build
        working-directory: barber-panel

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HAVUZ_44F70 }}
          channelId: live
          projectId: havuz-44f70
          target: whitecross-admin
